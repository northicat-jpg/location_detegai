name: Build Linux ARM Executable

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-24.04-arm  # GitHub ARM Linux 服务器

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 用 PyInstaller 构建可执行文件
        run: |
          pyinstaller \
            --onefile \
            --name location_detection \
            --add-data "config.json.example:." \
            main.py

      - name: 验证产物
        run: |
          ls -lh dist/
          file dist/location_detection

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: location_detection-linux-arm64
          path: dist/location_detection
          retention-days: 30
