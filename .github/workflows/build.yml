name: Build Linux ARM Executable

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04-arm  # ARM Linux (glibc 2.35, 兼容多数 ARM Linux)

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: PyInstaller 打包
        run: |
          pyinstaller \
            --onefile \
            --name location_detection \
            --add-data "config.json.example:." \
            main.py

      - name: 验证产物
        run: |
          ls -lh dist/
          file dist/location_detection
          ldd dist/location_detection 2>/dev/null || true

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: location_detection-linux-arm64
          path: dist/location_detection
          retention-days: 30
