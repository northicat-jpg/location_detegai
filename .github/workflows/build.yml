name: Build ARM64 Executable (glibc 2.31)

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    # ARM64 物理硬件（非模拟），原生 Docker，无 QEMU 性能损失
    runs-on: ubuntu-22.04-arm

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 在 Ubuntu 20.04 Docker 容器中构建
        run: |
          # 在 ARM64 原生 Docker 中运行 Ubuntu 20.04 容器
          # glibc 2.31 → 与 Lubuntu 20.04 完全兼容
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/ubuntu:20.04 \
            bash -c "
              set -e

              echo '[1/5] apt-get update...'
              apt-get update -qq

              echo '[2/5] 安装 wget + ca-certificates...'
              apt-get install -y -qq --no-install-recommends wget ca-certificates

              echo '[3/5] 下载 Miniconda (ARM64)...'
              wget -q https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-aarch64.sh -O /tmp/miniconda.sh
              bash /tmp/miniconda.sh -b -p /opt/conda
              rm /tmp/miniconda.sh

              export PATH=/opt/conda/bin:\$PATH
              echo '[4/5] 安装 Python 依赖...'
              pip install -q -r requirements.txt pyinstaller

              echo '[5/5] PyInstaller 打包...'
              pyinstaller --onefile --name location_detection main.py

              echo '构建完成!'
              ls -lh dist/location_detection
              file dist/location_detection
            "

      - name: 验证产物
        run: |
          ls -lh dist/
          file dist/location_detection

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: location_detection-arm64-glibc2.31
          path: dist/location_detection
          retention-days: 30
